# Runtime configuration for the test codebase.
# This file has a .toml extension which is not in the language config.
# Per R8 it is loaded as blank-line-delimited chunk children under the file node.

[sorting]
default_algorithm = "quick_sort"
max_n             = 1000000
stable            = false

[logging]
level   = "info"
colours = true


[limits]
detail_threshold = 30   # mirrors CodeTree.jl default
