package:
  name: agent
  version: 0.0.1
  dependencies:
    - prelude
    - effect
    - console
    - aff
    - either
    - maybe
    - tuples
    - arrays
    - strings
    - integers
    - node-fs
    - node-fs-aff
    - node-process
    - node-child-process
