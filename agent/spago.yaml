package:
  name: agent
  dependencies:
    - prelude
    - effect
    - console
    - aff
    - either
    - maybe
    - tuples
    - arrays
    - strings
    - integers
    - node-fs
    - node-process
    - node-child-process
    - node-readline
    - node-streams
    - node-http
    - argonaut-core
    - argonaut-codecs
    - ordered-collections
    - nonempty
    - foldable-traversable
    - newtype
    - parallel
  test:
    main: Test.Main
    dependencies:
      - spec
      - spec-quickcheck
      - quickcheck
      - ordered-collections
      - node-path
      - nonempty

workspace:
  # Run `spago install` after editing this file to regenerate spago.lock,
  # then update the outputHash in agent/default.nix.
  packageSet:
    registry: 76.2.1
