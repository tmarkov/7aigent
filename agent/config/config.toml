# 7aigent workspace configuration.
# This file is created on first run. Edit it before starting a session.

# Full URL of the chat completions endpoint (used as-is, nothing is appended).
# Example: https://openrouter.ai/api/v1/chat/completions
api_endpoint           = "YOUR_API_ENDPOINT_HERE"
model                  = "YOUR_MODEL_HERE"
api_key_env            = "OPENROUTER_API_KEY"
output_threshold_chars = 15000
max_api_retries        = 5
max_tokens_per_turn    = 50000
compaction_threshold   = 120000
preserve_initial       = 16000
preserve_final         = 8000
max_turns_per_round    = 20

[summaries]
max_targets_per_batch = 6
max_prompt_chars = 9000
max_children_per_target = 12
max_witness_chars = 300
max_readme_chars = 2500
